[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.26"
evm_version = "cancun"
via_ir = true
optimizer = true
optimizer_runs = 200
remappings = [
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
  "@somnia-chain/reactivity-contracts/=node_modules/@somnia-chain/reactivity-contracts/"
]

[fuzz]
runs = 512
